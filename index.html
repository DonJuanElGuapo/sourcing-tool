   <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sourcing Cam Companion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .ios-bounce { transition: transform 0.1s ease; }
        .ios-bounce:active { transform: scale(0.96); }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col justify-between">

<header class="bg-slate-800 border-b border-slate-700 py-4 px-6 sticky top-0 z-50 shadow-md flex justify-between items-center">
    <h1 class="text-lg font-bold tracking-wide flex items-center gap-2">
        <span class="text-emerald-400"><i class="fa-solid fa-tags"></i></span>
        Sourcing Cam Companion
    </h1>
    <button onclick="toggleSettings()" class="text-slate-400 hover:text-white p-2">
        <i class="fa-solid fa-gear text-lg"></i>
    </button>
</header>

<main class="flex-grow p-4 max-w-md mx-auto w-full space-y-4 pb-20">
    <div id="settingsPanel" class="hidden bg-slate-800 border border-slate-700 rounded-2xl p-4 space-y-3 shadow-xl">
        <div class="flex justify-between items-center">
            <h3 class="text-sm font-bold text-indigo-400 uppercase tracking-wider">AI Power-Up Settings</h3>
            <button onclick="toggleSettings()" class="text-slate-400 text-xs">Close</button>
        </div>
        <input type="password" id="apiKeyInput" placeholder="Paste new API Key" oninput="saveSettings()" class="w-full bg-slate-900 border border-slate-700 rounded-xl py-2 px-3 text-sm text-white focus:outline-none font-mono">
        <p class="text-[11px] text-indigo-300"><a href="https://aistudio.google.com/apikey" target="_blank" class="underline">Get free API Key <i class="fa-solid fa-external-link"></i></a></p>
    </div>

    <div class="bg-gradient-to-br from-indigo-900 to-indigo-950 rounded-2xl p-5 border border-indigo-500/30 shadow-lg text-center space-y-3">
        <h2 class="text-base font-bold text-indigo-200">Snap & Analyze</h2>
        <input type="file" accept="image/*" capture="environment" id="cameraInput" class="hidden" onchange="handlePhotoUpload(event)">
        <button onclick="triggerCamera()" class="ios-bounce w-full bg-indigo-500 hover:bg-indigo-400 text-white font-bold py-4 px-4 rounded-xl flex items-center justify-center gap-3 shadow-lg">
            <i class="fa-solid fa-camera"></i> <span>CAPTURE CLOTHING</span>
        </button>
        <div id="loadingStatus" class="hidden text-slate-300 text-xs flex items-center justify-center gap-2 py-2">
            <i class="fa-solid fa-spinner animate-spin text-indigo-400"></i> <span id="loadingMessage">Processing...</span>
        </div>
    </div>

    <div class="bg-slate-800 rounded-2xl p-4 border border-slate-700 shadow-lg space-y-4">
        <div class="grid grid-cols-2 gap-3">
            <div><label class="block text-xs text-slate-400">Buy Cost ($)</label><input type="number" id="buyCost" value="5.00" oninput="runCalculations()" class="w-full bg-slate-900 border border-slate-700 rounded-xl py-2 px-3 text-white"></div>
            <div><label class="block text-xs text-slate-400">Target Profit ($)</label><input type="number" id="targetProfit" value="15.00" oninput="runCalculations()" class="w-full bg-slate-900 border border-slate-700 rounded-xl py-2 px-3 text-white"></div>
        </div>
        <input type="number" id="estValue" placeholder="AI Estimated Value..." oninput="runCalculations()" class="w-full bg-slate-900 border border-slate-700 rounded-xl py-3 px-3 text-white font-bold text-lg">
        <p id="scannedItemTitle" class="text-xs text-indigo-300 italic hidden"></p>
    </div>

    <div id="verdictPanel" class="hidden"></div>

    <div class="bg-slate-800 rounded-2xl p-4 border border-slate-700 shadow-lg">
        <h2 class="text-xs font-semibold text-slate-400 uppercase mb-3">Today's History</h2>
        <div id="historyContainer" class="space-y-2 max-h-48 overflow-y-auto"></div>
    </div>
</main>

<canvas id="compressionCanvas" class="hidden"></canvas>

<script>
    let history = JSON.parse(localStorage.getItem('sourcingHistory')) || [];
    
    function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('hidden'); }
    function saveSettings() { localStorage.setItem('geminiApiKey', document.getElementById('apiKeyInput').value.trim()); }
    function triggerCamera() { document.getElementById('cameraInput').click(); }

    async function analyzeWithAI(base64Image, apiKey) {
        document.getElementById('loadingStatus').classList.remove('hidden');
        try {
            const response = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=" + apiKey, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    contents: [{ parts: [{text: "Analyze this clothing item for brand and estimated resale value. Return JSON: {brand, item_name, avg_price, confidence}"}, {inlineData: {mimeType: "image/jpeg", data: base64Image}}] }],
                    generationConfig: { responseMimeType: "application/json" }
                })
            });

            if (!response.ok) throw new Error("API Request failed");
            const result = await response.json();
            const aiData = JSON.parse(result.candidates[0].content.parts[0].text);
            
            document.getElementById('estValue').value = aiData.avg_price;
            document.getElementById('scannedItemTitle').innerText = `Matched: ${aiData.brand} ${aiData.item_name}`;
            document.getElementById('scannedItemTitle').classList.remove('hidden');
            runCalculations();
        } catch (err) {
            console.error(err);
            alert("Parsing failed. Ensure your API key is valid and fresh.");
        } finally {
            document.getElementById('loadingStatus').classList.add('hidden');
        }
    }

    function handlePhotoUpload(event) {
        const file = event.target.files[0];
        const apiKey = localStorage.getItem('geminiApiKey');
        if (!apiKey) return alert("Please enter your API key in settings.");
        
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.getElementById('compressionCanvas');
                canvas.width = 800; canvas.height = 800 * (img.height / img.width);
                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                analyzeWithAI(canvas.toDataURL('image/jpeg', 0.8).split(',')[1], apiKey);
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function runCalculations() {
        const est = parseFloat(document.getElementById('estValue').value) || 0;
        const buy = parseFloat(document.getElementById('buyCost').value) || 0;
        const profit = est * 0.8 - buy;
        const panel = document.getElementById('verdictPanel');
        
        if (est > 0) {
            panel.classList.remove('hidden');
            panel.innerHTML = `<div class="${profit > 0 ? 'bg-emerald-900' : 'bg-rose-900'} p-4 rounded-xl text-center font-bold">Projected Profit: $${profit.toFixed(2)}</div>`;
        }
    }
</script>
</body>
</html>

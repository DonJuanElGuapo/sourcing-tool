<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sourcing Cam Companion</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4">
    <div id="settingsPanel" class="hidden bg-slate-800 p-4 rounded-xl mb-4">
        <input type="password" id="apiKeyInput" placeholder="Paste NEW API Key" oninput="saveSettings()" class="w-full bg-slate-900 p-2 text-white">
    </div>
    <button onclick="document.getElementById('cameraInput').click()" class="w-full bg-indigo-500 p-4 rounded-xl font-bold">📷 CAPTURE</button>
    <input type="file" id="cameraInput" class="hidden" onchange="handlePhotoUpload(event)">
    <input type="text" id="estValue" class="mt-4 w-full bg-slate-800 p-4 rounded-xl text-white font-bold text-xl" placeholder="AI Value...">

<script>
    function saveSettings() { localStorage.setItem('geminiApiKey', document.getElementById('apiKeyInput').value.trim()); }
    window.onload = () => { document.getElementById('apiKeyInput').value = localStorage.getItem('geminiApiKey') || ''; };

    async function analyzeWithAI(base64Image, apiKey) {
        // Current stable model for high-performance tasks
        const modelName = "gemini-2.5-flash"; 
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
        
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    contents: [{ parts: [{text: "Return ONLY raw JSON: {\"brand\": \"\", \"item_name\": \"\", \"avg_price\": 0}"}, {inlineData: {mimeType: "image/jpeg", data: base64Image}} }]
                })
            });

            const data = await response.json();
            if (!response.ok) {
                console.error("API Error Details:", data);
                throw new Error(data.error?.message || "API request failed");
            }
            
            const aiData = JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|```/g, ""));
            document.getElementById('estValue').value = aiData.avg_price;
        } catch (err) {
            alert("AI Error: " + err.message);
        }
    }

    function handlePhotoUpload(event) {
        const file = event.target.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            const canvas = document.createElement('canvas');
            const img = new Image();
            img.onload = () => {
                canvas.width = 800; canvas.height = 800 * (img.height / img.width);
                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                analyzeWithAI(canvas.toDataURL('image/jpeg', 0.8).split(',')[1], localStorage.getItem('geminiApiKey'));
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }
</script>
</body>
</html>
